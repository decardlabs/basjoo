<h2>这个网站主要面向哪类访客？</h2>
<p class="subtitle">目标受众决定内容结构和功能优先级</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>🧑‍💻 技术开发者 / 潜在贡献者</h3>
      <p>关注架构设计、代码质量、开发进度、API 文档、如何参与贡献</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>🏢 企业用户 / 潜在客户</h3>
      <p>关注产品功能、部署方式、使用案例、是否稳定可用</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>🌐 两者兼顾</h3>
      <p>既推广产品能力给潜在用户，也展示开发进度给开发者社区</p>
    </div>
  </div>
</div>
