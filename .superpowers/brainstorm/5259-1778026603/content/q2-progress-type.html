<h2>「开发进度」展示的核心形式是什么？</h2>
<p class="subtitle">这直接决定后端管理的工作量和复杂度</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>📋 Changelog / 版本发布日志</h3>
      <p>类似 GitHub Releases，每次发布都记录功能更新、修复内容，按版本号归档</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>🗺️ Roadmap 路线图</h3>
      <p>展示"计划中 / 进行中 / 已完成"的功能列表，让访客知道项目方向</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>📰 开发博客 / 动态</h3>
      <p>不定期发文章记录开发过程、技术决策、踩坑经历，更有温度</p>
    </div>
  </div>
  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>🔀 三者都要</h3>
      <p>Changelog + Roadmap + 博客，全面覆盖；后端管理相应更复杂</p>
    </div>
  </div>
</div>
